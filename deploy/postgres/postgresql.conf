# Tuned for a low-RAM VPS (~4 GB total host RAM, 1 GB budget for Postgres).
# Generated from `pgtune` (web type, small server) and trimmed.

listen_addresses = '*'
port = 5432
max_connections = 50
superuser_reserved_connections = 3

# Memory
shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 64MB
work_mem = 8MB

# WAL / Checkpoint
wal_compression = on
wal_buffers = 16MB
checkpoint_completion_target = 0.9
min_wal_size = 80MB
max_wal_size = 1GB

# Background writer
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100

# Logical replication required by Supabase realtime
wal_level = logical
max_replication_slots = 5
max_wal_senders = 5

# Logging — minimal, JSON not required, rotate via Docker
log_min_messages = warning
log_min_error_statement = error
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'Asia/Kolkata'
log_statement = 'none'
log_duration = off

timezone = 'Asia/Kolkata'
datestyle = 'iso, mdy'
