user nginx;
worker_processes auto;
worker_rlimit_nofile 4096;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging — minimal to keep disk down on a small VPS
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  65;
  types_hash_max_size 2048;
  server_tokens off;
  client_max_body_size 50m;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/xml application/json application/javascript
    application/xml+rss application/atom+xml image/svg+xml;

  # Use Docker's embedded DNS so upstream names resolve and survive container
  # restarts. valid=10s makes nginx re-resolve quickly after a blue/green flip.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── Proxy defaults at http{} scope ───────────────────────────────────────
  # Declared once here, inherited by every server/location. Per-location
  # blocks can safely override these (unlike include'd snippets, which cause
  # "duplicate directive" errors when overridden in the same scope).
  proxy_read_timeout    3600s;     # long enough for Supabase realtime, SSE
  proxy_send_timeout    3600s;
  proxy_connect_timeout 10s;
  proxy_buffering on;              # SSE/WS locations set this off
  proxy_buffer_size 16k;
  proxy_buffers 8 16k;

  include /etc/nginx/conf.d/*.conf;

  # Liveness for the container HEALTHCHECK
  server {
    listen 80 default_server;
    server_name _;
    location /_nginx_health { return 200 "ok\n"; add_header Content-Type text/plain; }

    # ACME HTTP-01 challenge for certbot
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Everything else on :80 → redirect to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }
}
