# Shared TLS config. Cert paths are populated by certbot into
# /etc/letsencrypt/live/<domain>/ — first issuance is bootstrapped by
# deploy/scripts/issue-certs.sh.

ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
ssl_prefer_server_ciphers on;

# OCSP stapling
ssl_stapling on;
ssl_stapling_verify on;

# HSTS — only enable after you're sure all subdomains serve HTTPS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
