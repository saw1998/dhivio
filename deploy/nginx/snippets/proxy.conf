# Shared proxy headers ONLY. Everything that a per-location block might want
# to override (timeouts, buffering, cache) is set at the http{} level in
# nginx.conf instead — nginx rejects duplicate directives in the same
# location, so include + override doesn't work for those.

proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header Connection        "";
