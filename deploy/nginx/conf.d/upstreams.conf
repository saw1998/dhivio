# ─────────────────────────────────────────────────────────────────────────────
# This file is intentionally minimal. App upstreams (erp_upstream, mes_upstream)
# are NOT defined here because nginx resolves `upstream { server <host>; }`
# entries at config-load time — if the container is missing during a rolling
# deploy or fresh bootstrap, `nginx -t` fails outright and reloads abort.
#
# Instead, erp.dhivio.com.conf / mes.dhivio.com.conf use lazy DNS resolution:
#   set $target "dhivio-erp-blue:3000";
#   resolver 127.0.0.11 valid=10s ipv6=off;
#   proxy_pass http://$target;
#
# switch-traffic.sh rewrites that `set` line (NOT a `server` line in an
# upstream block) and reloads. Result: nginx is tolerant of missing
# containers (502s gracefully) and reloads always succeed.
#
# Kong is always-on infra, so it stays a normal upstream — no rolling deploys.
# ─────────────────────────────────────────────────────────────────────────────

upstream kong_upstream {
  server dhivio-kong:8000 max_fails=2 fail_timeout=10s;
  keepalive 32;
}
