# Active blue/green selection — rewritten by deploy/scripts/switch-traffic.sh
# during every deploy and reloaded with `nginx -s reload`. The script keeps a
# 5-line backup at upstreams.conf.bak so a rollback can restore in one move.

upstream erp_upstream {
  server dhivio-erp-blue:3000 max_fails=2 fail_timeout=10s;
  keepalive 32;
}

upstream mes_upstream {
  server dhivio-mes-blue:3000 max_fails=2 fail_timeout=10s;
  keepalive 32;
}

upstream kong_upstream {
  server dhivio-kong:8000 max_fails=2 fail_timeout=10s;
  keepalive 32;
}
