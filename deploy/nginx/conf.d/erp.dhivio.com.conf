###
# erp.dhivio.com — ERP app server (React Router 7 SSR on Node).
#
# HTTP-on-:80 block: serves /health for plaintext smoke tests + Let's Encrypt
# ACME challenge. Everything else redirects to https.
# HTTPS-on-:443 block: the real app.
#
# IMPORTANT: proxy_pass uses a variable (`$target`) + Docker's embedded
# resolver. This means nginx looks up the container name on every request
# instead of at config-load time, so missing/restarting containers don't
# block `nginx -t` or `nginx -s reload`. switch-traffic.sh rewrites the
# `set $target "..."` line and reloads — atomically.
###

server {
  listen 80;
  server_name erp.dhivio.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /health {
    set $target "dhivio-erp-blue:3000";
    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_pass http://$target;
    include snippets/proxy.conf;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name erp.dhivio.com;

  # Shared multi-SAN cert covering erp + mes + api. Lineage is created and
  # renewed by deploy/scripts/issue-certs.sh and the certbot sidecar.
  ssl_certificate     /etc/letsencrypt/live/dhivio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dhivio.com/privkey.pem;
  include snippets/ssl.conf;
  include snippets/security-headers.conf;

  # AI / SSE streaming endpoints — disable buffering. proxy_read_timeout
  # is already 3600s via snippets/proxy.conf; don't redeclare it here
  # (nginx rejects duplicate directives in the same location).
  location ~ ^/(api/chat|api/ai|api/stream) {
    set $target "dhivio-erp-blue:3000";
    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_pass http://$target;
    include snippets/proxy.conf;
    proxy_buffering off;
    proxy_cache off;
  }

  location / {
    set $target "dhivio-erp-blue:3000";
    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_pass http://$target;
    include snippets/proxy.conf;
  }
}
