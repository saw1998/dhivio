server {
  listen 443 ssl;
  http2 on;
  server_name erp.dhivio.com;

  ssl_certificate     /etc/letsencrypt/live/erp.dhivio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/erp.dhivio.com/privkey.pem;
  include snippets/ssl.conf;
  include snippets/security-headers.conf;

  # AI / SSE streaming endpoints — disable buffering. proxy_read_timeout
  # is already 3600s via snippets/proxy.conf; don't redeclare it here
  # (nginx rejects duplicate directives in the same location).
  location ~ ^/(api/chat|api/ai|api/stream) {
    proxy_pass http://erp_upstream;
    include snippets/proxy.conf;
    proxy_buffering off;
    proxy_cache off;
  }

  location / {
    proxy_pass http://erp_upstream;
    include snippets/proxy.conf;
  }
}
