###
# api.dhivio.com — Supabase gateway (Kong) + the /callback prefix that all
# OAuth providers (Google, Azure, Stripe webhooks, Razorpay webhooks) call
# back into. /callback is routed to the ERP app server.
###

server {
  listen 443 ssl;
  http2 on;
  server_name api.dhivio.com;

  ssl_certificate     /etc/letsencrypt/live/api.dhivio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.dhivio.com/privkey.pem;
  include snippets/ssl.conf;

  # OAuth + webhook callbacks → ERP. Note: Supabase's /auth/v1/callback is
  # a separate path under /auth/v1/ and stays on kong.
  location ^~ /callback/ {
    proxy_pass http://erp_upstream;
    include snippets/proxy.conf;
  }

  # Realtime WebSocket (Phoenix). proxy_read_timeout inherits from
  # snippets/proxy.conf (3600s) — don't redeclare it here, nginx rejects
  # duplicate directives in the same location.
  location ^~ /realtime/v1/ {
    proxy_pass http://kong_upstream;
    include snippets/proxy.conf;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
  }

  # Supabase REST/Auth/Storage/Functions/Meta
  location / {
    proxy_pass http://kong_upstream;
    include snippets/proxy.conf;
  }
}
