###
# mes.dhivio.com — MES app server.
#
# See erp.dhivio.com.conf for the rationale behind the lazy-DNS
# (`set $target` + resolver) pattern.
###

server {
  listen 80;
  server_name mes.dhivio.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /health {
    set $target "dhivio-mes-blue:3000";
    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_pass http://$target;
    include snippets/proxy.conf;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name mes.dhivio.com;

  # Shared multi-SAN cert — see erp.dhivio.com.conf.
  ssl_certificate     /etc/letsencrypt/live/dhivio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dhivio.com/privkey.pem;
  include snippets/ssl.conf;
  include snippets/security-headers.conf;

  location / {
    set $target "dhivio-mes-blue:3000";
    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_pass http://$target;
    include snippets/proxy.conf;
  }
}
