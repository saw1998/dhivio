name: Migrate Supabase (VPS)

###
# Copies the migrations + edge functions to the VPS and runs them against
# the self-hosted Supabase. Uses a small `psql`-based applier (not the
# `supabase` CLI, because supabase/cli isn't published on Docker Hub).
#
# Triggers
# --------
# * Manual via workflow_dispatch (the only trigger during initial bring-up).
# * Cron + workflow_run chaining commented out — re-enable once the first
#   Sat-22:00-IST production rollout has succeeded end-to-end.
#
# Required GitHub repo secrets
# ----------------------------
# VPS_HOST           e.g. 160.250.205.220
# VPS_USER           usually root (or a dedicated deploy user)
# VPS_SSH_PORT       usually 22
# VPS_SSH_KEY        private SSH key (matching pubkey is in /root/.ssh/authorized_keys on VPS)
###

on:
  # Re-enable once production rollout cadence is proven:
  # schedule:
  #   - cron: "30 16 * * 6"
  # workflow_run:
  #   workflows: ["Build & Push (Docker Hub)"]
  #   types: [completed]
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Stage migrations
        id: stage
        run: |
          RUN_ID="${{ github.run_id }}-$(date +%s)"
          mkdir -p .stage/supabase
          cp -r packages/database/supabase/migrations .stage/supabase/
          cp -r packages/database/supabase/functions  .stage/supabase/ 2>/dev/null || true
          cp packages/database/supabase/config.toml   .stage/supabase/ 2>/dev/null || true
          echo "run_id=$RUN_ID"        >> "$GITHUB_OUTPUT"
          echo "remote=/srv/dhivio/migrations-staging/$RUN_ID" >> "$GITHUB_OUTPUT"
          ls -R .stage

      - name: rsync to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: .stage/
          remote_path: ${{ steps.stage.outputs.remote }}/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_port: ${{ secrets.VPS_SSH_PORT }}
          remote_key:  ${{ secrets.VPS_SSH_KEY }}

      - name: Run migrations on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port:     ${{ secrets.VPS_SSH_PORT }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            /srv/dhivio/scripts/run-migrations.sh ${{ steps.stage.outputs.remote }}
