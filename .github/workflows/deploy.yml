name: Deploy (Rolling Blue/Green)

###
# Rolling blue/green deploy on the VPS. Runs:
#   * Automatically after Migrate Supabase succeeds (which itself runs after
#     Build & Push). So a Saturday-22:00-IST sequence is:
#         16:30 UTC → build-and-push.yml
#         on success → supabase.yml
#         on success → deploy.yml
#   * Manually via workflow_dispatch (with optional tag override).
#
# The actual rollout logic (pull → boot idle → wait healthy → flip nginx →
# stop old) lives in /srv/dhivio/scripts/deploy-app.sh on the VPS so we keep
# CI thin and auditable.
###

on:
  workflow_dispatch:
    inputs:
      apps:
        description: "Which apps to deploy"
        type: choice
        options: [both, erp, mes]
        default: both
      tag:
        description: "Image tag to deploy (default: github.sha of latest run)"
        type: string
        default: ""
  workflow_run:
    workflows: ["Migrate Supabase (VPS)"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Resolve matrix
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      apps: ${{ steps.set.outputs.apps }}
      tag:  ${{ steps.set.outputs.tag }}
    steps:
      - id: set
        run: |
          case "${{ github.event.inputs.apps || 'both' }}" in
            erp)  echo 'apps=["erp"]'        >> "$GITHUB_OUTPUT" ;;
            mes)  echo 'apps=["mes"]'        >> "$GITHUB_OUTPUT" ;;
            *)    echo 'apps=["erp","mes"]'  >> "$GITHUB_OUTPUT" ;;
          esac
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_run carries the parent's head_sha; manual dispatch uses
            # the current ref's sha as a sensible default.
            echo "tag=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # don't abort MES if ERP rollback succeeds, etc.
      matrix:
        app: ${{ fromJson(needs.matrix.outputs.apps) }}

    steps:
      - name: Roll out
        id: rollout
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port:     ${{ secrets.VPS_SSH_PORT }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            /srv/dhivio/scripts/deploy-app.sh ${{ matrix.app }} ${{ needs.matrix.outputs.tag }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install compatible Pulumi version
        run: |
          # Probes the in-app /health route (defined in
          # apps/<app>/app/routes/_public+/health.tsx). Must match the path
          # in deploy/compose.apps.yml healthchecks.
          #
          # During bring-up (before Feature 5 sets up real DNS + LE prod
          # certs), the public hostname may resolve to a different server OR
          # serve a staging cert that curl rejects with "unable to get local
          # issuer". So we probe in this order:
          #   1. VPS-direct HTTP/:80 (always works, no cert involved)
          #   2. VPS-direct HTTPS/:443 with -k (accepts staging cert)
          #   3. Public HTTPS (only succeeds once Feature 5 is done)
          # ANY of these passing means the deployment is healthy.
          set +e   # don't let `set -e` kill us between retries
          host="${{ matrix.app }}.dhivio.com"
          vps_ip="${{ secrets.VPS_HOST }}"

          probe() {
            curl -fsS --max-time 10 "$@" -o /dev/null
          }

          for i in 1 2 3 4 5; do
            if probe --resolve "$host:80:$vps_ip" "http://$host/health"; then
              echo "✓ $host healthy via VPS-direct HTTP (attempt $i)"
              exit 0
            fi
            if probe -k --resolve "$host:443:$vps_ip" "https://$host/health"; then
              echo "✓ $host healthy via VPS-direct HTTPS (attempt $i)"
              exit 0
            fi
            if probe "https://$host/health"; then
              echo "✓ $host healthy via public HTTPS (attempt $i)"
              exit 0
            fi
            echo "  attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "✗ smoke test failed for $host after 5 attempts" >&2
          exit 1

      - name: Rollback on failure
        if: failure() && steps.rollout.outcome == 'success'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port:     ${{ secrets.VPS_SSH_PORT }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            /srv/dhivio/scripts/deploy-app.sh ${{ matrix.app }} rollback
